services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-help_perm}
      POSTGRES_USER: ${POSTGRES_USER:-help_perm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-help_perm_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-help_perm} -d ${POSTGRES_DB:-help_perm}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  cms:
    build:
      context: ../cms
      dockerfile: Dockerfile
    ports:                                                                                                                                           
      - "1337:1337"                                                                                                                                  
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${STRAPI_HOST:-0.0.0.0}
      PORT: ${STRAPI_PORT:-1337}
      APP_KEYS: ${APP_KEYS:-change-me-app-key-1,change-me-app-key-2}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-change-me-api-token-salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-admin-jwt-secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-change-me-transfer-token-salt}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-encryption-key}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      DATABASE_CLIENT: ${DATABASE_CLIENT:-postgres}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${POSTGRES_DB:-help_perm}
      DATABASE_USERNAME: ${POSTGRES_USER:-help_perm}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-help_perm_change_me}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-public}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_URL: ${DATABASE_URL:-}
      STRAPI_PUBLIC_URL: ${STRAPI_PUBLIC_URL:-http://localhost:1337}
    volumes:
      - cms_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  web:
    build:
      context: ../app
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      CMS_INTERNAL_URL: ${CMS_INTERNAL_URL:-http://cms:1337}
      NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL:-http://localhost:1337}
      YANDEX_METRICA: ${YANDEX_METRICA:-0}
    depends_on:
      - cms
    restart: always

  nginx:
    image: jonasal/nginx-certbot:latest
    restart: always
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-admin@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./user_conf.d:/etc/nginx/user_conf.d:ro
      - ./include.d:/etc/nginx/include.d:ro
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - web
      - cms

volumes:
  postgres_data:
  cms_uploads:
  letsencrypt:
