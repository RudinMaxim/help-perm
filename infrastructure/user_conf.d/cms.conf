# cms.бесплатная-помощь-зависимым.рф (Punycode: cms.xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai)

server {
    listen 443 ssl;
    server_name cms.xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai;

    ssl_certificate         /etc/letsencrypt/live/cms.xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/cms.xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cms.xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai/chain.pem;

    include /etc/nginx/include.d/all-ssl.conf;

    client_max_body_size 50m;

    location / {
        proxy_pass         http://cms:1337;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name cms.xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
