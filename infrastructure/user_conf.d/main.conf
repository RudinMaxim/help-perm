# бесплатная-помощь-зависимым.рф (Punycode: xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai)

server {
    listen 443 ssl;
    server_name xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai www.xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai;

    ssl_certificate         /etc/letsencrypt/live/xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai/chain.pem;

    include /etc/nginx/include.d/all-ssl.conf;

    location /_next/static {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai www.xn-----6kcacbmswma1aqgaftblf9apk9o7br8e.xn--p1ai;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
